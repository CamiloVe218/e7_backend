version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: servicios_db
    environment:
      POSTGRES_USER: servicios
      POSTGRES_PASSWORD: servicios123
      POSTGRES_DB: servicios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicios"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../infrastructure/Dockerfile.backend
    container_name: servicios_backend
    environment:
      DATABASE_URL: postgresql://servicios:servicios123@postgres:5432/servicios_db
      JWT_SECRET: super-secret-jwt-key-change-in-production-2024
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/Dockerfile.frontend
    container_name: servicios_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
